<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ weather.city }} 天气</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-cyan-50 p-4">
  <div class="max-w-sm mx-auto bg-white rounded-2xl shadow-lg overflow-hidden border border-blue-100">
    <div class="p-5">
      <div class="flex justify-between items-start">
        <div>
          <h1 class="text-xl font-bold text-gray-800">{{ weather.city }}</h1>
          <p class="text-gray-500 text-sm">{{ weather.updated_at }}</p>
        </div>
        <span class="text-3xl">{{ weather.emoji }}</span>
      </div>

      <div class="mt-4 pt-4 border-t border-gray-100">
        <div class="flex justify-between items-baseline">
          <span class="text-3xl font-bold text-gray-900">{{ weather.temperature }}</span>
          <span class="text-gray-500 text-sm">体感 {{ weather.feels_like }}</span>
        </div>
        <p class="mt-1 text-gray-700">{{ weather.description }}</p>
      </div>

      <div class="mt-4 grid grid-cols-2 gap-3 text-xs">
        <div class="bg-blue-50 p-2 rounded-lg">
          <p class="text-blue-700 font-medium">湿度</p>
          <p class="text-blue-900">{{ weather.humidity }}</p>
        </div>
        <div class="bg-green-50 p-2 rounded-lg">
          <p class="text-green-700 font-medium">风</p>
          <p class="text-green-900">{{ weather.wind }}</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
